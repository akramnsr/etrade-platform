version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: etrade-postgres
    environment:
      POSTGRES_DB: etrade_db
      POSTGRES_USER: etrade_user
      POSTGRES_PASSWORD: etrade_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U etrade_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:22.0.0
    container_name: etrade-keycloak
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/etrade_db
      KC_DB_USERNAME: etrade_user
      KC_DB_PASSWORD: etrade_password
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    command: start-dev

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: etrade-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/etrade_db
      SPRING_DATASOURCE_USERNAME: etrade_user
      SPRING_DATASOURCE_PASSWORD: etrade_password
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: etrade-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:8081/api

volumes:
  postgres_data:

networks:
  default:
    name: etrade-network
