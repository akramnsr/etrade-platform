version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: etrade-postgres-prod
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - etrade-network

  backend:
    image: ${REGISTRY}/etrade-backend:${VERSION}
    container_name: etrade-backend-prod
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://postgres:5432/${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      KEYCLOAK_ISSUER_URI: ${KEYCLOAK_ISSUER_URI}
      KEYCLOAK_JWK_SET_URI: ${KEYCLOAK_JWK_SET_URI}
      CORS_ALLOWED_ORIGINS: ${FRONTEND_URL}
    restart: unless-stopped
    depends_on:
      - postgres
    networks:
      - etrade-network

  frontend:
    image: ${REGISTRY}/etrade-frontend:${VERSION}
    container_name: etrade-frontend-prod
    restart: unless-stopped
    networks:
      - etrade-network

  nginx:
    image: nginx:alpine
    container_name: etrade-nginx-prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./ssl:/etc/nginx/ssl
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    networks:
      - etrade-network

volumes:
  postgres_data:

networks:
  etrade-network:
    driver: bridge
